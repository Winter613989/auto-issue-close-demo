name: Auto-Close Labeled Issues

on:
  issues:
    types: [labeled]

jobs:
  close-labeled-issues:
    runs-on: ubuntu-latest
    if: |
      github.event.label.name == 'completed' || github.event.label.name == 'wontfix'
    steps:
      - name: Close issue
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.issue.number;
            const label = context.payload.label.name;
            
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed'
            });
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `This issue has been automatically closed because it was labeled as **${label}**.`
            });
            
            console.log(`Closed issue #${issueNumber} due to '${label}' label.`);
